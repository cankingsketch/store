        const lerp = (current, target, factor) => current * (1 - factor) + target * factor;

        class LoopingText {
          constructor(el) {
            this.el = el;
            this.lerp = {current: 0, target: 0};
            this.interpolationFactor = 0.1;
            this.speed = 0.14;
            this.direction = -1; // -1 (to-left), 1 (to-right) 

            this.render();
          }

          events() {
            window.addEventListener("scroll", () => this.lerp.target += this.speed * 5);
          }

          animate() {
            this.lerp.target += this.speed;
            this.lerp.current = lerp(this.lerp.current, this.lerp.target, this.interpolationFactor);
            
            if (this.lerp.target > 100) {
              this.lerp.current -= this.lerp.target;
              this.lerp.target = 0;
            }

            const x = this.lerp.current * this.direction;
            this.el.style.transform = `translateX(${x}%)`;
          }

          render() {
            this.animate();
            window.requestAnimationFrame(() => this.render());
          }
        }

<script>
setTimeout(() => {
  let elBacktop = document.getElementById('ns-backtop');
  let isShow = false;
  elBacktop.addEventListener('click', () => {
    window.scrollTo({
      top: 0,
      behavior: 'smooth',
    });
  });

  function debounce(fn, delay = 500) {
    let timer;
  
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        fn(...args);
      }, delay);
    };
  }

  const onScroll = debounce(() => {
    if (window.scrollY > 100) {
      if (!isShow) {
        elBacktop.classList.add('show');
        isShow = true;
      }
    } else {
	  if (isShow) {
	    elBacktop.classList.remove('show');
		isShow = false;
	  }
    }
  }, 100);

  window.addEventListener('scroll', onScroll);
});

</script>
